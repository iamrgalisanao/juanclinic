<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tenant HIS - Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .dashboard-container {
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .panel {
            flex: 1;
            padding: 20px;
        }
        .panel-left {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { font-weight: 600; color: var(--accent); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; opacity: 0.7; margin-bottom: 8px; }
        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            background: var(--accent);
            color: var(--bg-color);
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .order-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }
        .status { font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; background: rgba(56, 189, 248, 0.2); color: var(--accent); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="panel panel-left">
            <h1>Patient Intake</h1>
            <div class="form-group">
                <label>FIRST NAME</label>
                <input type="text" placeholder="John">
            </div>
            <div class="form-group">
                <label>LAST NAME</label>
                <input type="text" placeholder="Doe">
            </div>
            <div class="form-group">
                <label>DATE OF BIRTH</label>
                <input type="date">
            </div>
            <button class="btn">Register & Order</button>
        </div>
        <div class="panel">
            <h1>Active Orders</h1>
            <div class="order-item">
                <div>
                    <div style="font-weight: 600;">ORD-8821</div>
                    <div style="font-size: 0.8rem; opacity: 0.6;">Patient: Jane Smith</div>
                </div>
                <div class="status">PENDING</div>
            </div>
            <div class="order-item">
                <div>
                    <div style="font-weight: 600;">ORD-5542</div>
                    <div style="font-size: 0.8rem; opacity: 0.6;">Patient: Robert Clark</div>
                </div>
                <div class="status" style="background:rgba(34, 197, 94, 0.2); color:#4ade80;">COMPLETED</div>
            </div>
        </div>
    </div>
</body>
</html>
